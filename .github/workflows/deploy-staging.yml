# ──────────────────────────────────────────────────────────────────────────────
# STAGING — deploys main → GitHub Pages (preview URL)
# URL: https://<org>.github.io/WoafyPet_LandingPage/
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Staging (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:           # allow manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment runs at a time; new pushes cancel the old one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build (staging)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # VITE_BASE_PATH not set → vite.config.ts falls back to '/WoafyPet_LandingPage/'
        # VITE_BREVO_API_KEY — set this in GitHub → Settings → Secrets → Actions
        env:
          VITE_BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          VITE_BREVO_LIST_ID: ${{ secrets.BREVO_LIST_ID }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
