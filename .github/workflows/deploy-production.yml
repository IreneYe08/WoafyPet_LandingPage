# ──────────────────────────────────────────────────────────────────────────────
# PRODUCTION — deploys production branch → Hostinger via FTP (Node.js hosting)
# Domain: woafy.pet
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   FTP_SERVER       — your Hostinger FTP hostname, e.g. ftp.woafy.pet
#   FTP_USERNAME     — FTP account username
#   FTP_PASSWORD     — FTP account password
#   GA_ID          — GA4 Measurement ID, e.g. G-XXXXXXXXXX
#   FTP_SERVER_DIR — remote directory, e.g. /domains/woafy.pet/public_html/
#
# After first deploy, run in Hostinger hPanel → Node.js:
#   npm install --production   (installs express)
#   Set entry point: server.js
#   Set startup command: node server.js
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Production (Hostinger FTP)

on:
  push:
    branches: [main]          # auto-deploy on merge to main
  workflow_dispatch:          # keep manual trigger for hotfix deploys
    inputs:
      branch:
        description: 'Branch to deploy (leave blank for main)'
        required: false
        default: 'main'

# Prevent two production deploys from running at the same time.
concurrency:
  group: production
  cancel-in-progress: false   # do NOT cancel in-progress production deploys

jobs:
  build:
    name: Build (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /           # root domain — no sub-path needed on Hostinger
          VITE_GA_MEASUREMENT_ID: ${{ secrets.GA_ID }}
        run: npm run build

      - name: Assemble server package
        run: |
          mkdir -p deploy
          cp server.js package.json package-lock.json deploy/
          cp -r dist deploy/dist

      - name: Upload deploy package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-deploy
          path: ./deploy
          retention-days: 7         # keep build artifact for 7 days (useful for rollback)

  deploy:
    name: Deploy to Hostinger via FTP
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production              # ties to the "production" GitHub Environment
      url: https://woafy.pet
    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: production-deploy
          path: ./deploy

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          # Only upload changed files (compares local vs remote state file)
          state-name: .ftp-deploy-sync-state.json
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
