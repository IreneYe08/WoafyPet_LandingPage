# ──────────────────────────────────────────────────────────────────────────────
# PRODUCTION — deploys production branch → Hostinger via FTP
# Domain: woafy.pet
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   FTP_SERVER    — your Hostinger FTP hostname, e.g. ftp.woafy.pet
#   FTP_USERNAME  — FTP account username
#   FTP_PASSWORD  — FTP account password
#
# Required GitHub Variable (Settings → Variables → Actions):
#   FTP_SERVER_DIR — remote directory, typically /public_html/ or /domains/woafy.pet/public_html/
# ──────────────────────────────────────────────────────────────────────────────
name: Deploy Production (Hostinger FTP)

on:
  workflow_dispatch:          # ONLY manual trigger — review on GitHub Pages first, then run this
    inputs:
      branch:
        description: 'Branch to deploy (leave blank for main)'
        required: false
        default: 'main'

# Prevent two production deploys from running at the same time.
concurrency:
  group: production
  cancel-in-progress: false   # do NOT cancel in-progress production deploys

jobs:
  build:
    name: Build (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /           # root domain — no sub-path needed on Hostinger
        run: npm run build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: ./dist
          retention-days: 7         # keep build artifact for 7 days (useful for rollback)

  deploy:
    name: Deploy to Hostinger via FTP
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production              # ties to the "production" GitHub Environment
      url: https://woafy.pet
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: production-dist
          path: ./dist

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ vars.FTP_SERVER_DIR }}
          # Only upload changed files (compares local vs remote state file)
          state-name: .ftp-deploy-sync-state.json
          # Exclude the state file itself and any dot-files you don't want overwritten
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
